<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Basic Meta -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Dhanorix Market | Top Up Game Cepat, Aman, & Murah</title>
    <meta name="description" content="Dhanorix Market menyediakan layanan top up game terpercaya, cepat, aman, dan harga murah untuk berbagai game favorit.">
    <meta name="keywords" content="Top Up Game, Mobile Legends, Free Fire, PUBG Mobile, Blood Strike, FC Mobile, PES, HOK, Magic Chess, Dhanorix Market">
    <meta name="author" content="Dhanorix Market">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0d1117">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Dhanorix Market">
    <meta property="og:description" content="Top up game Cepat, Aman, & Murah.">
    <meta property="og:image" content="assets/logo.png">
    <meta property="og:locale" content="id_ID">

    <!-- Favicon -->
    <link rel="icon" href="assets/logo.png" type="image/png">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===================================================== -->
    <!-- Loading Screen -->
    <!-- ===================================================== -->
    <div class="loading-screen" id="loadingScreen" aria-hidden="true">
        <div class="loading-content">
            <img
                src="assets/logo.png"
                alt="Logo Dhanorix Market"
                class="loading-logo"
                draggable="false">

            <h2 class="loading-title">Dhanorix Market</h2>

            <div class="loading-spinner" aria-hidden="true">
                <span></span>
            </div>
        </div>
    </div>

    <!-- ===================================================== -->
    <!-- Main Website -->
    <!-- ===================================================== -->
    <div class="website-wrapper">

        <!-- Header -->
        <header class="site-header">

            <div class="container">

                <div class="brand">

                    <img
                        src="assets/logo 2.png"
                        alt="Logo Dhanorix Market"
                        class="brand-logo">

                    <div class="brand-text">

                        <h1 class="site-title">
                            Dhanorix Market
                        </h1>

                        <p class="site-subtitle">
                            Top up game Cepat, Aman, &amp; Murah
                        </p>

                    </div>

                </div>

            </div>

        </header>

        <!-- Main Content -->
        <main class="main-content">

            <section class="game-section" aria-labelledby="game-list-title">

                <div class="container">

                    <header class="section-header">

                        <h2 id="game-list-title">
                            Pilih Game
                        </h2>

                        <p>
                            Silakan pilih game yang ingin kamu top up.
                        </p>

                    </header>

                    <!-- Grid Game -->
                    <section class="game-grid">

                        <!-- Blood Strike -->
                        <article class="game-card" data-game="Blood Strike">

                            <a href="#" class="game-link" aria-label="Top Up Blood Strike">

                                <figure class="game-image">

                                    <img
                                        src="assets/bs.jpeg"
                                        alt="Blood Strike">

                                </figure>

                                <div class="game-info">

                                    <h3>
                                        Blood Strike
                                    </h3>

                                </div>

                            </a>

                        </article>

                        <!-- Magic Chess -->
                        <article class="game-card" data-game="Magic Chess">

                            <a href="#" class="game-link" aria-label="Top Up Magic Chess">

                                <figure class="game-image">

                                    <img
                                        src="assets/mcgg.webp"
                                        alt="Magic Chess">

                                </figure>

                                <div class="game-info">

                                    <h3>
                                        Magic Chess
                                    </h3>

                                </div>

                            </a>

                        </article>

                        <!-- Mobile Legends -->
                        <article class="game-card" data-game="Mobile Legends">

                            <a href="#" class="game-link" aria-label="Top Up Mobile Legends">

                                <figure class="game-image">

                                    <img
                                        src="assets/ml.png.jpg"
                                        alt="Mobile Legends">

                                </figure>

                                <div class="game-info">

                                    <h3>
                                        Mobile Legends
                                    </h3>

                                </div>

                            </a>

                        </article>

                        <!-- Free Fire -->
                        <article class="game-card" data-game="Free Fire">

                            <a href="#" class="game-link" aria-label="Top Up Free Fire">

                                <figure class="game-image">

                                    <img
                                        src="assets/ff.jpeg"
                                        alt="Free Fire">

                                </figure>

                                <div class="game-info">

                                    <h3>
                                        Free Fire
                                    </h3>

                                </div>

                            </a>

                        </article>

                        <!-- PUBG Mobile -->
                        <article class="game-card" data-game="PUBG Mobile">

                            <a href="#" class="game-link" aria-label="Top Up PUBG Mobile">

                                <figure class="game-image">

                                    <img
                                        src="assets/pubg.jpeg"
                                        alt="PUBG Mobile">

                                </figure>

                                <div class="game-info">

                                    <h3>
                                        PUBG Mobile
                                    </h3>

                                </div>

                            </a>

                        </article>

                        <!-- FC Mobile -->
                        <article class="game-card" data-game="FC Mobile">

                            <a href="#" class="game-link" aria-label="Top Up FC Mobile">

                                <figure class="game-image">

                                    <img
                                        src="assets/fcmobile.png"
                                        alt="FC Mobile">

                                </figure>

                                <div class="game-info">

                                    <h3>
                                        FC Mobile
                                    </h3>

                                </div>

                            </a>

                        </article>

                        <!-- PES -->
                        <article class="game-card" data-game="PES">

                            <a href="#" class="game-link" aria-label="Top Up PES">

                                <figure class="game-image">

                                    <img
                                        src="assets/pes.jpeg"
                                        alt="PES">

                                </figure>

                                <div class="game-info">

                                    <h3>
                                        PES
                                    </h3>

                                </div>

                            </a>

                        </article>

                        <!-- HOK -->
                        <article class="game-card" data-game="HOK">

                            <a href="#" class="game-link" aria-label="Top Up HOK">

                                <figure class="game-image">

                                    <img
                                        src="assets/hok.jpeg"
                                        alt="HOK">

                                </figure>

                                <div class="game-info">

                                    <h3>
                                        HOK
                                    </h3>

                                </div>

                            </a>

                        </article>

                    </section>

                </div>

            </section>

        </main>

    </div>

    <!-- ===================================================== -->
    <!-- Toast Notification Container -->
    <!-- ===================================================== -->
    <div
        id="toastContainer"
        class="toast-container"
        aria-live="polite"
        aria-atomic="true">
    </div>

    <!-- ===================================================== -->
    <!-- Main Javascript -->
    <!-- ===================================================== -->
    <script src="script.js"></script>

</body>
</html>
